<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="logo-banner">
        <img src="{{ url_for('static', filename='images/pokemon_logo.svg') }}" alt="Pokemon">
    </div>

    <div class="card">

        {% if pokemon_id %}
        <div class="pokemon-display">
            <img
                src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/{{ pokemon_id }}.png"
                alt="{{ pokemon_name }}"
            >
        </div>
        <div class="dialog-box">
            <p class="dex-number">#{{ '%03d' % pokemon_id }}</p>
            <h1>{{ pokemon_name }}</h1>
        </div>
        {% else %}
        <div class="pokemon-row">
            <img src="{{ url_for('static', filename='images/pikachu.png') }}" alt="Pikachu">
            <img src="{{ url_for('static', filename='images/jigglypuff.png') }}" alt="Jigglypuff">
            <img src="{{ url_for('static', filename='images/eevee.png') }}" alt="Eevee">
        </div>
        <div class="dialog-box">
            <h1>Choose a Pokemon!</h1>
        </div>
        {% endif %}

        <form method="POST">
            <select name="pokemon_id">
                {% for i in range(1, total + 1) %}
                <option value="{{ i }}" {% if i == selected %}selected{% endif %}>
                    {{ '#%03d' % i }}
                </option>
                {% endfor %}
            </select>
            <button type="submit">
                <img src="{{ url_for('static', filename='images/pokeball.png') }}" alt="">
                WHO'S THAT POKEMON?
            </button>
        </form>

    </div>

    <p class="footer">&#9679; GOTTA CODE &#39;EM ALL &#9679;</p>

</body>
</html>
